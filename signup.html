<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join World Comics</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            width: 100%; height: 100%; 
            display: flex; align-items: center; justify-content: center; 
            background: #111; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            color: #eee;
            overflow: hidden;
        }

        .signup-container {
            width: 100%; max-width: 450px; padding: 40px;
            background: rgba(10, 8, 20, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .signup-container h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 32px;
            color: #fff;
            margin-bottom: 8px;
        }

        .signup-container p {
            font-size: 14px;
            color: #667;
            margin-bottom: 32px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            color: #667;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #ccc;
            font-size: 15px;
            outline: none;
            transition: 0.2s;
        }

        .form-group input:focus {
            border-color: #e94560;
            background: rgba(255, 255, 255, 0.08);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: #d13850;
            transform: translateY(-1px);
        }

        .btn-submit:disabled {
            background: #445;
            cursor: not-allowed;
        }

        .footer-link {
            margin-top: 24px;
            font-size: 13px;
            color: #667;
        }

        .footer-link a {
            color: #e94560;
            text-decoration: none;
            font-weight: 600;
        }

        .footer-link a:hover {
            text-decoration: underline;
        }

        .status-msg {
            margin-top: 16px;
            font-size: 13px;
            display: none;
            padding: 10px;
            border-radius: 6px;
        }

        .status-msg.success { display: block; background: rgba(46, 204, 113, 0.1); color: #2ecc71; }
        .status-msg.error { display: block; background: rgba(231, 69, 96, 0.1); color: #e94560; }

        /* Background deco - subtle comic shapes */
        .bg-deco {
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .circle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(233,69,96,0.05) 0%, transparent 70%);
        }
        .c1 { width: 400px; height: 400px; top: -100px; right: -100px; }
        .c2 { width: 300px; height: 300px; bottom: -50px; left: -50px; }
    </style>
</head>
<body>
    <div class="bg-deco">
        <div class="circle c1"></div>
        <div class="circle c2"></div>
    </div>

    <div class="signup-container">
        <h1>Create Account</h1>
        <p>Join the ultimate digital comic library</p>
        
        <form id="signupForm">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="fullName" placeholder="Peter Parker" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="peter@dailybugle.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label for="favoriteComic">Favorite Comic (Optional)</label>
                <input type="text" id="favoriteComic" name="favoriteComic" placeholder="Amazing Spider-Man">
            </div>
            <button type="submit" class="btn-submit" id="submitBtn">Sign Up</button>
        </form>

        <div id="statusMsg" class="status-msg"></div>

        <div class="footer-link">
            Already have an account? <a href="home.html">Go to Home</a>
        </div>
    </div>

    <script>
        // REPLACE THIS URL with your deployed Google Apps Script Web App URL
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz9Gh8LxAcqvy2KLk_5cybq5Z-b92xFv6xGDksHyM63LrMQj5WTxObEDxS4B3rtPYVKuw/exec';

        const form = document.getElementById('signupForm');
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('statusMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (SCRIPT_URL === 'YOUR_GOOGLE_SCRIPT_WEB_APP_URL_HERE') {
                showStatus('Please configure the SCRIPT_URL in the code first!', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Creating account...';
            showStatus('', '');

            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Google Apps Script requires no-cors for simple POSTs
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                // Because of no-cors, we can't read the response body, 
                // but if the fetch doesn't throw, it usually worked.
                localStorage.setItem('deco_name', data.fullName);
                localStorage.setItem('deco_email', data.email);
                localStorage.setItem('deco_favorite', data.favoriteComic || 'None');
                
                showStatus('Account created successfully! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            } catch (error) {
                console.error('Error:', error);
                showStatus('Something went wrong. Please try again.', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Sign Up';
            }
        });

        function showStatus(text, type) {
            msg.textContent = text;
            msg.className = 'status-msg ' + type;
            if (!text) msg.style.display = 'none';
        }
    </script>
</body>
</html>
